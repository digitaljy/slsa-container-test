name: Release

on:
  push:
    tags:
      - '*'

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    permissions:
      contents: write
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha

      - id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: image
        run: echo "image=${IMAGE_REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"

  sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: write
    needs: build
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (Cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}"
          cosign sign --yes "$IMAGE_REF"

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: "ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}"

      - name: Attest SBOM with Cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}"
          SBOM_FILE=$(ls *.spdx.json)

          echo "Signing SBOM: $SBOM_FILE"

          cosign attest --yes \
            --predicate "$SBOM_FILE" \
            --type spdx \
            "$IMAGE_REF"

  provenance:
    needs: [build, sign]
    permissions:
      actions: read
      id-token: write
      packages: write
    if: startsWith(github.ref, 'refs/tags/')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  attach-provenance:
    needs: [provenance, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ORAS CLI
        run: |
          VERSION="1.3.0"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_${VERSION}_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_${VERSION}_*.tar.gz oras-install/

      - name: Download provenance
        uses: actions/download-artifact@v4
        with:
          name: slsa-provenance
          path: .

      - name: Attach provenance as OCI referrer
        run: |
          IMAGE="ghcr.io/${{ github.repository }}@${{ needs.build.outputs.digest }}"
          PROV_FILE="provenance.intoto.jsonl"

          oras push \
            "$IMAGE" \
            --artifact-type application/vnd.in-toto+json \
            provenance=$PROV_FILE